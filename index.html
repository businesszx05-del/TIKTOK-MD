<body>

<!-- Top Left Balloons -->
<img src="images/balloon-left.png" class="balloon-left" alt="Balloon">

<!-- Top Right Balloon Decoration -->
<img src="images/balloon-right.png" class="balloon-right" alt="Balloon">

<div class="background"></div>

<div class="container">

    <div class="top">
        <h1>🎉 Birthday Surprise 🎉</h1>
        <p>Enter Secret PIN</p>
    </div>

    <div class="pin-display">

        <span id="dot1"></span>
        <span id="dot2"></span>
        <span id="dot3"></span>
        <span id="dot4"></span>

    </div>

    <div id="error"></div>

    <div class="keypad">

        <button onclick="press(1)">1</button>
        <button onclick="press(2)">2</button>
        <button onclick="press(3)">3</button>

        <button onclick="press(4)">4</button>
        <button onclick="press(5)">5</button>
        <button onclick="press(6)">6</button>

        <button onclick="press(7)">7</button>
        <button onclick="press(8)">8</button>
        <button onclick="press(9)">9</button>

        <button onclick="clearPin()">
            <i class="fa-solid fa-delete-left"></i>
        </button>

        <button onclick="press(0)">0</button>

        <button onclick="checkPin()">
            <i class="fa-solid fa-arrow-right"></i>
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
