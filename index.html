<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    
    <link rel="stylesheet" href="style.css">
    
    <preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

    <div class="background"></div>

    <img src="https://i.postimg.cc/pLqPpgSv/1783407299513.png" class="top-balloons-strip" alt="Top Balloons">

    <div class="main-container">
        
        <img src="https://i.postimg.cc/prHSQJGk/1783407025709.png" class="cute-girl" alt="Cute Boy">

        <div class="content-panel">
            <h1 class="main-heading">HYE DEAR <br> PLEASE ENTER THE <br> PASSWORD GET SURPRISES</h1>
            <p class="subtitle">Enter Your Secret PIN</p>

            <div class="pin-display">
                <span id="dot1"></span>
                <span id="dot2"></span>
                <span id="dot3"></span>
                <span id="dot4"></span>
            </div>

            <p id="error"></p>

            <div class="keypad">
                <button onclick="press(1)"><span>1</span></button>
                <button onclick="press(2)"><span>2</span></button>
                <button onclick="press(3)"><span>3</span></button>
                
                <button onclick="press(4)"><span>4</span></button>
                <button onclick="press(5)"><span>5</span></button>
                <button onclick="press(6)"><span>6</span></button>
                
                <button onclick="press(7)"><span>7</span></button>
                <button onclick="press(8)"><span>8</span></button>
                <button onclick="press(9)"><span>9</span></button>
                
                <button class="icon-btn" onclick="clearPin()">
                    <span><i class="fa-solid fa-delete-left"></i></span>
                </button>
                <button onclick="press(0)"><span>0</span></button>
                <button class="icon-btn" onclick="checkPin()">
                    <span><i class="fa-solid fa-arrow-right"></i></span>
                </button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
