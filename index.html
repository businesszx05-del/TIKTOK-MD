<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SCREEN 1: Passcode Page -->
    <div id="screen-passcode" class="screen main-container">
        
        <!-- Top Decorations (Balloons) -->
        <div class="top-balloons"></div>
        <div class="right-balloon-arch"></div>

        <!-- Left Side: Character Image -->
        <div class="left-section">
            <!-- Aap apni pasand ki chibi image ka link yahan 'src' mein daal sakte hain -->
            <img src="https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=500" alt="Cute Boy Character" class="character-img">
        </div>

        <!-- Right Side: Passcode Interface -->
        <div class="right-section">
            <div class="birthday-banner">HAPPY BIRTHDAY</div>
            
            <!-- Code Dots Indicator -->
            <div class="dots-container">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>

            <!-- Modern Round Keypad -->
            <div class="keypad">
                <button onclick="pressKey('1')">1<span></span></button>
                <button onclick="pressKey('2')">2<span>ABC</span></button>
                <button onclick="pressKey('3')">3<span>DEF</span></button>
                <button onclick="pressKey('4')">4<span>GHI</span></button>
                <button onclick="pressKey('5')">5<span>JKL</span></button>
                <button onclick="pressKey('6')">6<span>MNO</span></button>
                <button onclick="pressKey('7')">7<span>PQRS</span></button>
                <button onclick="pressKey('8')">8<span>TUV</span></button>
                <button onclick="pressKey('9')">9<span>WXYZ</span></button>
                <button onclick="clearCode()" class="utility-btn">C</button>
                <button onclick="pressKey('0')">0<span></span></button>
                <button onclick="checkCode()" class="utility-btn">✓</button>
            </div>
        </div>
    </div>

    <!-- SCREEN 2: Next Page (Cake Screen) -->
    <div id="screen-cake" class="screen hidden next-page">
        <div class="cake-card">
            <h2>Make a Wish! 🎂</h2>
            <button class="action-btn" onclick="blowCandle()">BLOW</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
