<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<!-- Background -->

<div class="background"></div>

<!-- Decorations -->

<img
src="https://i.postimg.cc/pLqPpgSv/1783407299513.png"
class="top-balloon"
alt="Top Balloon">

<img
src="https://i.postimg.cc/C5WbfwFH/1783407216563.png"
class="right-balloon"
alt="Right Balloon">

<!-- Main Layout -->

<div class="main-layout">

<!-- LEFT SIDE -->

<div class="left-side">

<img
src="https://i.postimg.cc/prHSQJGk/1783407025709.png"
class="cute-girl"
alt="Cute Girl">

</div>

<!-- RIGHT SIDE -->

<div class="right-side">

<h1>

🎉 Birthday <br>

Surprise 🎉

</h1>

<p class="subtitle">

Enter Your Secret PIN

</p>

<div class="pin-display">

<span id="dot1"></span>

<span id="dot2"></span>

<span id="dot3"></span>

<span id="dot4"></span>

</div>

<p id="error"></p>
<!-- Keypad -->

<div class="keypad">

<button onclick="press(1)">
1
</button>

<button onclick="press(2)">
2
</button>

<button onclick="press(3)">
3
</button>

<button onclick="press(4)">
4
</button>

<button onclick="press(5)">
5
</button>

<button onclick="press(6)">
6
</button>

<button onclick="press(7)">
7
</button>

<button onclick="press(8)">
8
</button>

<button onclick="press(9)">
9
</button>

<button
class="icon-btn"
onclick="clearPin()">

<i class="fa-solid fa-delete-left"></i>

</button>

<button onclick="press(0)">
0
</button>

<button
class="icon-btn"
onclick="checkPin()">

<i class="fa-solid fa-arrow-right"></i>

</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
